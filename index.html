<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Integral Calculator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef0f4;
      --surface: #ffffff;
      --surface2: #f4f5f8;
      --border: #d8dce8;
      --border-lt: #e8ebf3;
      --text: #0a1628;
      --text-mid: #2c3a5a;
      --text-muted: #6b7899;
      --navy: #0f2d6e;
      --navy-dk: #0a2058;
      --navy-lt: #e8edf8;
      --navy-mid: #b8c6e0;
      --navy-btn: #1a3a7a;
      --accent: #1e55c4;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(15,45,110,.06), 0 4px 16px rgba(15,45,110,.05);
      --shadow-md: 0 2px 8px rgba(15,45,110,.1), 0 8px 30px rgba(15,45,110,.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      border-bottom: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 2px 20px rgba(10,32,88,.35);
    }
    .hdr {
      max-width: 820px;
      margin: 0 auto;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 48px; height: 48px;
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .hdr-text h1 { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .hdr-text p  { font-size: 12.5px; color: rgba(255,255,255,.6); margin-top: 2px; }

    /* ── MAIN ── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 28px 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ── EXAMPLES BANNER ── */
    .examples-banner {
      background: var(--navy-lt);
      border: 1px solid var(--navy-mid);
      border-radius: var(--radius);
      padding: 14px 20px;
    }
    .examples-banner p {
      font-size: 11.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--navy);
      margin-bottom: 10px;
    }
    .ex-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .ex-chip {
      padding: 5px 13px;
      border: 1.5px solid var(--navy-mid);
      border-radius: 999px;
      font-size: 12.5px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--navy);
      background: var(--surface);
      cursor: pointer;
      transition: all .14s;
      font-weight: 500;
    }
    .ex-chip:hover {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
    }

    /* ── INPUT SECTION ── */
    .input-card { padding: 22px 24px; }
    .input-label {
      font-size: 11.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    .fn-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
      background: var(--surface);
    }
    .fn-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(30,85,196,.12);
    }
    .fn-prefix {
      padding: 0 14px;
      font-size: 18px;
      color: var(--text-muted);
      background: var(--surface2);
      border-right: 1px solid var(--border-lt);
      display: flex; align-items: center;
      height: 52px;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
    }
    #fn-input {
      flex: 1;
      height: 52px;
      border: none;
      outline: none;
      padding: 0 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: var(--text);
      background: transparent;
    }
    #fn-input::placeholder { color: #aab; font-weight: 400; }

    /* live preview */
    .preview-wrap {
      margin-top: 10px;
      min-height: 44px;
      padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border-lt);
      border-radius: 8px;
      display: flex;
      align-items: center;
    }
    .preview-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-muted);
      margin-right: 14px;
      white-space: nowrap;
    }
    #latex-preview { font-size: 1.1rem; }
    #latex-preview .katex { color: var(--navy); }

    /* ── INTEGRAL TYPE ── */
    .type-row { display: flex; gap: 10px; margin-top: 18px; }
    .type-btn {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      transition: all .14s;
    }
    .type-btn.active {
      border-color: var(--navy);
      background: var(--navy-lt);
      color: var(--navy);
    }
    .type-btn:hover:not(.active) { border-color: var(--navy-mid); }

    /* bounds */
    .bounds-row {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      display: none;
    }
    .bounds-row.show { display: flex; }
    .bound-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .bound-field label {
      font-size: 11.5px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .bound-field input {
      height: 42px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .13s;
    }
    .bound-field input:focus { border-color: var(--accent); }

    /* ── CALCULATE BUTTON ── */
    .btn-run {
      width: 100%;
      height: 54px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      box-shadow: 0 3px 16px rgba(15,45,110,.35);
      transition: background .14s, transform .08s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 20px;
    }
    .btn-run:hover { background: var(--navy-dk); }
    .btn-run:active { transform: scale(.99); }
    .btn-run:disabled { opacity: .6; cursor: not-allowed; }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-run.loading .spinner { display: block; }
    .btn-run.loading .bl { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SOLUTION BOX ── */
    .solution-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .sol-hdr {
      background: var(--navy);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sol-hdr-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .sol-hdr span {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .02em;
    }

    /* The single continuous derivation block */
    .sol-body {
      padding: 30px 36px 36px;
    }
    @media (max-width: 560px) {
      .sol-body { padding: 20px 18px 24px; }
    }

    .derivation {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sol-line {
      padding: 5px 0;
      line-height: 1.9;
      overflow-x: auto;
    }
    .sol-line.text {
      font-size: 13.5px;
      color: var(--text-muted);
      font-style: italic;
      padding: 8px 0 4px;
    }
    .sol-line.math .katex { font-size: 1.15rem; }
    .sol-line.math .katex-display { margin: 0; }

    /* Final answer highlight */
    .final-answer {
      margin-top: 18px;
      padding: 16px 22px;
      background: var(--navy-lt);
      border: 1.5px solid var(--navy-mid);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .final-answer .fa-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--navy);
      white-space: nowrap;
    }
    .final-answer .katex { font-size: 1.25rem; color: var(--navy); }

    /* separator */
    .sol-sep {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 10px 0;
    }

    /* error */
    .error-box {
      background: #fff5f5;
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      padding: 16px 22px;
      color: #b91c1c;
      font-size: 14px;
      font-weight: 500;
    }
    .error-box strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">∫</div>
    <div class="hdr-text">
      <h1>Integral Calculator</h1>
      <p>Step-by-step integration with full working · Definite &amp; Indefinite</p>
    </div>
  </div>
</header>

<main>

  <!-- EXAMPLES -->
  <div class="examples-banner">
    <p>Try an example</p>
    <div class="ex-row">
      <span class="ex-chip" onclick="setExample('x^3 + 2x^2 - x + 4')">x³ + 2x² − x + 4</span>
      <span class="ex-chip" onclick="setExample('sin(x) + cos(x)')">sin(x) + cos(x)</span>
      <span class="ex-chip" onclick="setExample('e^(2x)')">e^(2x)</span>
      <span class="ex-chip" onclick="setExample('3x^4 - 5x^2 + 7')">3x⁴ − 5x² + 7</span>
      <span class="ex-chip" onclick="setExample('sqrt(x)')">√x</span>
      <span class="ex-chip" onclick="setExample('1/x^2')">1/x²</span>
      <span class="ex-chip" onclick="setExample('x*e^x')">x·eˣ</span>
      <span class="ex-chip" onclick="setExample('ln(x)')">ln(x)</span>
      <span class="ex-chip" onclick="setExample('tan(x)')">tan(x)</span>
      <span class="ex-chip" onclick="setExample('x^2 * sin(x)')">x²·sin(x)</span>
    </div>
  </div>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="input-card">

      <label class="input-label">Function  f(x)</label>

      <div class="fn-wrap">
        <div class="fn-prefix">∫</div>
        <input id="fn-input" type="text" placeholder="e.g.  x^3 + sin(x) + e^x"
               oninput="updatePreview()" onkeydown="if(e.key==='Enter'||event.key==='Enter')run()"/>
        <div class="fn-prefix" style="border-right:none;border-left:1px solid var(--border-lt)">dx</div>
      </div>

      <!-- Live LaTeX preview -->
      <div class="preview-wrap">
        <span class="preview-label">Preview</span>
        <div id="latex-preview"></div>
      </div>

      <!-- Type selector -->
      <div class="type-row">
        <button class="type-btn active" id="btn-indef" onclick="setType('indefinite')">Indefinite ∫ f(x) dx</button>
        <button class="type-btn"        id="btn-def"   onclick="setType('definite')">Definite ∫ₐᵇ f(x) dx</button>
      </div>

      <!-- Bounds -->
      <div class="bounds-row" id="bounds-row">
        <div class="bound-field">
          <label>Lower bound  a</label>
          <input id="lower" type="text" placeholder="0"/>
        </div>
        <div class="bound-field">
          <label>Upper bound  b</label>
          <input id="upper" type="text" placeholder="1"/>
        </div>
      </div>

      <button class="btn-run" id="run-btn" onclick="run()">
        <span class="bl">▶ &nbsp; Calculate</span>
        <span class="spinner"></span>
      </button>

    </div>
  </div>

  <!-- SOLUTION -->
  <div id="result-area"></div>

</main>

<script>
  let itype = "indefinite";

  // ── KaTeX helpers ───────────────────────────────────────────────────────────
  function waitK(fn) {
    if (typeof katex !== "undefined") { fn(); return; }
    const t = setInterval(() => { if (typeof katex !== "undefined") { clearInterval(t); fn(); } }, 40);
  }

  function K(latex, display = false) {
    try { return katex.renderToString(latex, { displayMode: display, throwOnError: false, strict: false }); }
    catch { return `<code>${latex}</code>`; }
  }

  // ── Live preview ────────────────────────────────────────────────────────────
  // Convert user input → rough LaTeX for preview (no backend needed)
  function toPreviewLatex(s) {
    if (!s.trim()) return "";
    let t = s;
    // e^(...) → e^{...}
    t = t.replace(/e\^\(([^)]+)\)/g, "e^{$1}");
    t = t.replace(/e\^([a-zA-Z0-9]+)/g, "e^{$1}");
    // x^n → x^{n}
    t = t.replace(/\^(\d+)/g, "^{$1}");
    t = t.replace(/\^([a-zA-Z(][^+\-*/^]*)/g, "^{$1}");
    // sqrt(x) → \sqrt{x}
    t = t.replace(/sqrt\(([^)]+)\)/g, "\\sqrt{$1}");
    // ln → \ln, sin → \sin etc.
    t = t.replace(/\b(sin|cos|tan|sec|csc|cot|ln|log|exp)\b/g, "\\$1");
    // 1/x^2 → \frac{1}{x^2}  (simple fraction)
    t = t.replace(/(\d+|[a-zA-Z])\s*\/\s*([a-zA-Z0-9^{}\\]+)/g, "\\frac{$1}{$2}");
    // * → \cdot
    t = t.replace(/\*/g, " \\cdot ");
    return t;
  }

  function updatePreview() {
    const s = document.getElementById("fn-input").value;
    const prev = document.getElementById("latex-preview");
    if (!s.trim()) { prev.innerHTML = '<span style="color:#aab;font-size:13px">LaTeX preview appears here…</span>'; return; }
    waitK(() => {
      try {
        const lx = toPreviewLatex(s);
        prev.innerHTML = K(`\\displaystyle\\int ${lx}\\, dx`);
      } catch { prev.textContent = s; }
    });
  }

  // ── Type / bounds ────────────────────────────────────────────────────────────
  function setType(t) {
    itype = t;
    document.getElementById("btn-indef").classList.toggle("active", t === "indefinite");
    document.getElementById("btn-def").classList.toggle("active", t === "definite");
    document.getElementById("bounds-row").classList.toggle("show", t === "definite");
    updatePreview();
  }

  function setExample(fn) {
    document.getElementById("fn-input").value = fn;
    updatePreview();
  }

  // ── Run ──────────────────────────────────────────────────────────────────────
  async function run() {
    const fn = document.getElementById("fn-input").value.trim();
    if (!fn) { alert("Please enter a function."); return; }

    const btn = document.getElementById("run-btn");
    btn.classList.add("loading"); btn.disabled = true;

    try {
      const body = {
        function: fn,
        type: itype,
        lower: document.getElementById("lower")?.value || "",
        upper: document.getElementById("upper")?.value || "",
      };

      const res  = await fetch("/api/integrate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      renderResult(data, fn);
    } catch (err) {
      document.getElementById("result-area").innerHTML =
        `<div class="error-box"><strong>Connection error</strong>The API could not be reached. Check your deployment.</div>`;
    } finally {
      btn.classList.remove("loading"); btn.disabled = false;
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────────
  function isLatex(s) { return /[\\^_{]/.test(s) || /\\[a-zA-Z]/.test(s); }

  function renderResult(data, fn) {
    if (!data.success) {
      document.getElementById("result-area").innerHTML =
        `<div class="error-box"><strong>Calculation error</strong>${escHtml(data.error)}</div>`;
      return;
    }

    const steps = data.steps;
    if (!steps || !steps.length) {
      document.getElementById("result-area").innerHTML =
        `<div class="error-box">No steps returned.</div>`;
      return;
    }

    // The last step is the final answer
    const finalStep = steps[steps.length - 1];
    const bodySteps = steps.slice(0, -1);

    let lines = "";
    bodySteps.forEach((line, i) => {
      if (isLatex(line)) {
        // Display math or inline?
        const display = line.startsWith("\\int") || line.startsWith("=") || line.startsWith("\\Bigl") || line.startsWith("\\therefore");
        lines += `<div class="sol-line math">${K(line, display)}</div>`;
      } else {
        lines += `<div class="sol-line text">${escHtml(line)}</div>`;
      }
    });

    // Final answer
    const finalDisplay = isLatex(finalStep) ? K(finalStep, false) : escHtml(finalStep);
    const faHtml = `
      <div class="final-answer">
        <div class="fa-label">Answer</div>
        <div>${finalDisplay}</div>
      </div>`;

    // Type label
    const typeLbl = itype === "definite"
      ? `Definite Integral  ·  a = ${document.getElementById("lower").value || "?"}, b = ${document.getElementById("upper").value || "?"}`
      : "Indefinite Integral";

    const html = `
      <div class="solution-box">
        <div class="sol-hdr">
          <div class="sol-hdr-icon">∫</div>
          <span>Solution — ${typeLbl}</span>
        </div>
        <div class="sol-body">
          <div class="derivation">
            ${lines}
            ${faHtml}
          </div>
        </div>
      </div>`;

    document.getElementById("result-area").innerHTML = html;
    document.getElementById("result-area").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  waitK(() => {
    updatePreview();
  });
</script>
</body>
</html>
